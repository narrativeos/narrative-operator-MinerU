services:
  gateway:
    build:
      context: .
    depends_on:
      - redis
    container_name: one-mineru-gateway
    ports:
      - "8912:8000"
    volumes:
      - ./paddleocr:/root/.paddleocr
      - ./tmp:/app/tmp/:rw
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      TZ: Asia/Shanghai
    # command: ["/app/app/entrypoint.sh"]
    restart: always
    networks:
      - default

  redis:
    image: redis:7.2.4
    container_name: one-mineru-redis
    volumes:
      - ./redis/conf/redis.conf:/etc/redis.conf
      - ./redis/data/:/data/
    restart: always
    entrypoint: ["redis-server", "/etc/redis.conf"]
    environment:
      TZ: Asia/Shanghai
    networks:
      - default

networks:
  default:
    driver: bridge
    ipam:
      driver: default
