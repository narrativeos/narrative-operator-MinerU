# ============================================================================
# MinerU GPU 覆盖配置（仅 Linux + NVIDIA GPU 使用）
# ============================================================================
#
# 使用方式：
#   docker compose -f docker-compose.yaml -f docker-compose.gpu.yml --profile gradio up -d
#
# 此文件为 docker-compose.yaml 添加 GPU 支持和 IPC host 模式，
# 自动合并到基础配置中。
# ============================================================================

services:
  mineru-openai-server:
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]

  mineru-api:
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]

  mineru-gradio:
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
