# ============================================================================
# MinerU Docker Compose (macOS & Linux 通用基础配置)
# ============================================================================
#
# 启动方式：
#   macOS / 无 GPU Linux：
#     docker compose --profile gradio up -d
#
#   Linux + NVIDIA GPU：
#     docker compose -f docker-compose.yaml -f docker-compose.gpu.yml up -d
#
# 构建镜像：
#   docker compose build
#   docker compose build --no-cache   # 强制重新构建
# ============================================================================

x-mineru-build: &mineru-build
  build:
    context: .
    dockerfile: docker/global/Dockerfile
  image: narrativeos/mineru:latest

services:
  mineru-openai-server:
    <<: *mineru-build
    container_name: mineru-openai-server
    restart: always
    profiles: ["openai-server"]
    ports:
      - "30000:30000"
    environment:
      MINERU_MODEL_SOURCE: local
    entrypoint: mineru-openai-server
    command:
      --host 0.0.0.0
      --port 30000
      --data-parallel-size 1
      --gpu-memory-utilization 0.5
    ulimits:
      memlock: -1
      stack: 67108864
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:30000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  mineru-api:
    <<: *mineru-build
    container_name: mineru-api
    restart: always
    profiles: ["api"]
    ports:
      - "8000:8000"
    environment:
      MINERU_MODEL_SOURCE: local
    entrypoint: mineru-api
    command:
      --host 0.0.0.0
      --port 8000
      --max-convert-pages 1500
      --batch-max-convert-pages 100
      --data-parallel-size 1
      --gpu-memory-utilization 0.5
    ulimits:
      memlock: -1
      stack: 67108864

  mineru-gradio:
    <<: *mineru-build
    container_name: mineru-gradio
    restart: always
    profiles: ["gradio"]
    ports:
      - "7860:7860"
    environment:
      MINERU_MODEL_SOURCE: local
    entrypoint: mineru-gradio
    command:
      --server-name 0.0.0.0
      --server-port 7860
      --enable-api true
      --max-convert-pages 1500
      --batch-max-convert-pages 100
      --data-parallel-size 1
      --gpu-memory-utilization 0.5
    ulimits:
      memlock: -1
      stack: 67108864
