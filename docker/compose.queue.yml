# Docker Compose for MinerU Queue Service (SQLite-backed, no Redis needed)
# Usage: docker compose -f docker/compose.queue.yml up -d

services:
  queue:
    build:
      context: ../services/queue
      dockerfile: Dockerfile
    container_name: narrative-operator-mineru-queue
    restart: always
    ports:
      - "8403:8403"
    volumes:
      - ../output:/app/output
      - queue-tmp:/tmp/mineru-queue
    networks:
      - mineru-queue
    environment:
      TZ: Asia/Shanghai
      MINERU_API_URL: http://host.docker.internal:8401
      # Note: For local (non-Docker) use, set MINERU_API_URL=http://localhost:8401
      MINERU_QUEUE_PORT: 8403
      MINERU_QUEUE_HOST: 0.0.0.0
      MINERU_QUEUE_MAX_SIZE: 20
      MINERU_QUEUE_RESULT_TTL: 86400
      MINERU_QUEUE_OUTPUT_ROOT: /app/output
      MINERU_QUEUE_TMP_DIR: /tmp/mineru-queue
      MINERU_QUEUE_POLL_INTERVAL: 1.0
      MINERU_QUEUE_DB_PATH: /app/output/mineru_queue.db

volumes:
  queue-tmp:

networks:
  mineru-queue:
    driver: bridge