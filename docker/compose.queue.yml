# Docker Compose for MinerU Queue Service
# Usage: docker compose -f docker/compose.queue.yml up -d

services:
  redis:
    image: redis:7.2-alpine
    container_name: narrative-operator-mineru-redis
    restart: always
    # No external ports - internal network only
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --requirepass mineru_queue_redis
    volumes:
      - redis-data:/data
    networks:
      - mineru-queue
    environment:
      TZ: Asia/Shanghai

  queue:
    build:
      context: ../services/queue
      dockerfile: Dockerfile
    container_name: narrative-operator-mineru-queue
    restart: always
    depends_on:
      - redis
    ports:
      - "8403:8403"
    volumes:
      - ../output:/app/output
      - queue-tmp:/tmp/mineru-queue
    networks:
      - mineru-queue
    environment:
      TZ: Asia/Shanghai
      MINERU_API_URL: http://host.docker.internal:8401
      MINERU_REDIS_HOST: redis
      MINERU_REDIS_PORT: 6379
      MINERU_REDIS_DB: 0
      MINERU_REDIS_PASSWORD: mineru_queue_redis
      MINERU_QUEUE_PORT: 8403
      MINERU_QUEUE_HOST: 0.0.0.0
      MINERU_QUEUE_MAX_SIZE: 20
      MINERU_QUEUE_RESULT_TTL: 86400
      MINERU_QUEUE_OUTPUT_ROOT: /app/output
      MINERU_QUEUE_TMP_DIR: /tmp/mineru-queue
      MINERU_QUEUE_POLL_INTERVAL: 1.0

volumes:
  redis-data:
  queue-tmp:

networks:
  mineru-queue:
    driver: bridge
